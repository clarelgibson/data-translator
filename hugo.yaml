baseURL: "https://datatranslator.co.uk/"
locale: "en-gb"
title: "Data Translator"
theme: "PaperMod"

# Pretty URLs and correct output for Papermod
enableRobotsTXT: true # generates robots.txt file so search engines can index your site
buildDrafts: false # content marked as draft will not be published
buildFuture: false # content with a publishDate in the future will not be published

# Strip whitespace from HTML output to reduce file size and improve page load times
minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: "Data Translator"
  description: "Data analytics portfolio of Clare Gibson"
  author: "Clare Gibson"
  defaultTheme: auto
  ShowShareButtons: false
  ShowReadingTime: true
  ShowBreadcrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  homeMode: profile

  profileMode:
    enabled: true
    title: "Clare Gibson"
    subtitle: "Translating data into decisions"
    imageUrl: "/img/clare-headshot.jpg"
    imageTitle: "Clare Gibson"
    imageWidth: 200
    imageHeight: 200
    buttons:
      - name: About
        url: about
      - name: Projects
        url: projects

  assets:
    favicon: "favicon.ico"
    favicon16x16: "favicon-16x16.png"
    favicon32x32: "favicon-32x32.png"
    apple_touch_icon: "apple-touch-icon.png"

  label:
    text: "Data Translator"
    icon: "/img/dt-logo.png"
    iconHeight: 32

menu:
  main:
    - identifier: about
      name: About
      url: /about/
      weight: 10
    - identifier: projects
      name: Projects
      url: /projects/
      weight: 20